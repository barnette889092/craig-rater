elp?", "model_output": "Certainly! You can use the following Python code to count the vowels in a string and return a dictionary with the counts (case insensitive):\n\n```python\ndef count_vowels(s):\n    vowels = 'aeiou'\n    count_dict = {vowel: 0 for vowel in vowels}\n    \n    for char in s.lower():\n        if char in count_dict:\n            count_dict[char] += 1\n    \n    return count_dict\n\n# Example usage:\ninput_string = \"Hello World\"\nvowel_counts = count_vowels(input_string)\nprint(vowel_counts)\n```\n\n### Explanation:\n1. **Initialization**: We define the vowels as a string `'aeiou'`.\n2. **Dictionary Setup**: We create a dictionary `count_dict` with each vowel as a key and initialize their counts to 0.\n3. **Iterate through String**: Convert the input string to lowercase to make the counting case insensitive, and iterate through each character.\n4. **Update Counts**: If the character is a vowel (i.e., it exists in `count_dict`), increment its count.\n5. **Return the Dictionary**: Finally, return the dictionary containing the counts of each vowel.\n\n### Example Output:\nFor the input string `\"Hello World\"`, the output will be:\n```python\n{'a': 0, 'e': 1, 'i': 0, 'o': 2, 'u': 0}\n```\n\nThis indicates that there is 1 'e', 2 'o's, and no 'a', 'i', or 'u' in the string."}, {"id": "CAL-031", "task_prompt": "Implement add type annotations to this function: def add(a, b): return a + b.\n\nContext: Add type annotations to this function: def add(a, b): return a + b\n\nPlease handle errors and include type annotations.", "model_output": "To add type annotations to the `add` function and handle potential errors, you can use Python's type hinting features along with error handling. Here's how you can do it:\n\n```python\nfrom typing import Union\n\ndef add(a: Union[int, float], b: Union[int, float]) -> Union[int, float]:\n    \"\"\"\n    Add two numbers a and b and return the result.\n    \n    Parameters:\n    a (int or float): The first number to add.\n    b (int or float): The second number to add.\n    \n    Returns:\n    int or float: The sum of a and b.\n    \n    Raises:\n    TypeError: If either a or b is not an int or float.\n    \"\"\"\n    if not isinstance(a, (int, float)):\n        raise TypeError(\"Both arguments must be int or float\")\n    if not isinstance(b, (int, float)):\n        raise TypeError(\"Both arguments must be int or float\")\n    \n    return a + b\n```\n\n### Explanation:\n- **Type Annotations**: The function `add` now has type annotations specifying that both `a` and `b` should be either `int` or `float`, and the return type is also `int` or `float`.\n- **Error Handling**: The function checks if `a` and `b` are instances of `int` or `float`. If not, it raises a `TypeError` with an appropriate message. This ensures that the function only processes numbers, preventing runtime errors from adding incompatible types."}, {"id": "CAL-078", "task_prompt": "Write code that explain what async/await does in python with a brief example. I'm not sure about the approach.", "model_output": "Sure, I'd be happy to help explain async/await in Python and provide a brief example.\n\nIn Python, async/await is a feature that allows you to write asynchronous code, which can perform non-blocking operations and handle multiple tasks concurrently. This is particularly useful for I/O-bound and high-level structured network code.\n\nHere's a brief explanation followed by a simple example:\n\n### Explanation\n\n1. **async def**: This keyword is used to define an asynchronous function, which returns a coroutine object. A coroutine is a special function that can pause its execution and wait for some operation to complete, such as an I/O operation, without blocking the entire program.\n\n2. **await**: This keyword is used inside an asynchronous function to pause its execution until the awaited coroutine object completes. This allows other tasks to run during this waiting period, improving the efficiency of I/O-bound operations.\n\n### Example\n\nLet's create a simple example that simulates fetching data from two different sources asynchronously.\n\n```python\nimport asyncio\n\n# Simulate an asynchronous data fetching function\nasync def fetch_data(source):\n    print(f\"Start fetching data from {source}\")\n    await asyncio.sleep(2)  # Simulate a delay (e.g., network request)\n    print(f\"Data fetched from {source}\")\n    return f\"Data from {source}\"\n\n# Define the main asynchronous function\nasync def main():\n    print(\"Start fetching\")\n    # Create tasks for fetching data from two sources\n    task1 = asyncio.create_task(fetch_data(\"Source 1\"))\n    task2 = asyncio.create_task(fetch_data(\"Source 2\"))\n    \n    # Wait for both tasks to complete\n    data1 = await task1\n    data2 = await task2\n    \n    print(\"Data fetched\")\n    print(data1)\n    print(data2)\n\n# Run the main function using asyncio\nasyncio.run(main())\n```\n\n### Explanation of the Example\n\n1. **fetch_data**: This is an asynchronous function that simulates fetching data from a source. It uses `await asyncio.sleep(2)` to simulate a delay, similar to waiting for an I/O operation to complete.\n\n2. **main**: This is the main asynchronous function that starts the data fetching process. It creates two tasks using `asyncio.create_task`, which schedules the coroutines to run concurrently.\n\n3. **await**: The `await` keyword is used to wait for the completion of each task. This allows the program to handle other tasks during the waiting period, making the overall execution more efficient.\n\n4. **asyncio.run(main())**: This line runs the `main` function in the asyncio event loop, which is necessary to execute asynchronous code.\n\n### Output\n\nWhen you run the above code, you'll see the following output:\n\n```\nStart fetching\nStart fetching data from Source 1\nStart fetching data from Source 2\nData fetched from Source 1\nData fetched from Source 2\nData fetched\nData from Source 1\nData from Source 2\n```\n\nThis output demonstrates how the two data fetching operations are executed concurrently, with each starting almost immediately after the other, rather than waiting for the first operation to complete before starting the second.\n\nI hope this helps! Let me know if you have any further questions."}, {"id": "CAL-080", "task_prompt": "Implement add feature flag support to the application config with environment variable fallback, ensuring that:\n\n1.\n\nContext: Add feature flag support to the application config with environment variable fallback, ensuring that:\n\n1. Feature flags can be toggled on/off for different environments (e.g., development, staging, production).\n2. Implement a caching mechanism to reduce the number of environment variable lookups.\n3. Log every change in feature flag status, including the environment and the user who made the change.\n4. Provide an API endpoint to dynamically update feature flags at runtime, with proper authentication and authorization checks.\n5. Ensure that the feature flags are version-controlled and auditable, with a history of changes and who made them.\n6. Handle edge cases where environment variables are not set, ensuring the application can still start and operate with default settings.\n7. Optimize for performance, minimizing the overhead of checking feature flags in critical code paths.\n8. Write unit and integration tests to cover all scenarios, including toggling flags, caching behavior, and API endpoint functionality.\n\nPlease handle errors and include type annotations.", "model_output": "To implement feature flag support with environment variable fallback, caching, logging, dynamic updates, and version control, we can use a combination of Python and Redis for caching. Below is a step-by-step guide to achieving this:\n\n### Step 1: Define the Feature Flag Class\n\n```python\nfrom typing import Optional, Dict\nimport os\nimport redis\nimport logging\nfrom datetime import datetime\nimport hashlib\nimport json\n\n# Configure logging\nlogging.basicConfig(level=logging.INFO)\nlogger = logging.getLogger(__name__)\n\n# Initialize Redis connection\nredis_client = redis.StrictRedis(host='localhost', port=6379, db=0)\n\nclass FeatureFlag:\n    def __init__(self, flag_name: str, default_value: bool = False):\n        self.flag_name = flag_name\n        self.default_value = default_value\n\n    def is_enabled(self) -> bool:\n        # Check cache\n        cache_key = f\"feature_flag:{self.flag_name}\"\n        cached_value = redis_client.get(cache_key)\n        if cached_value is not None:\n            return cached_value.decode() == 'True'\n\n        # Check environment variable\n        env_value = os.getenv(self.flag_name)\n        if env_value is not None:\n            value = env_value.lower() in ['true', '1', 't', 'y', 'yes']\n            redis_client.set(cache_key, str(value), ex=3600)  # Cache for 1 hour\n            return value\n\n        # Use default value\n        return self.default_value\n\n    def update_flag(self, value: bool, user: str):\n        # Update environment variable (simulated here)\n        os.environ[self.flag_name] = str(value)\n\n        # Log change\n        log_message = {\n            \"flag_name\": self.flag_name,\n            \"value\": value,\n            \"user\": user,\n            \"timestamp\": datetime.utcnow().isoformat()\n        }\n        logger.info(f\"Feature flag updated: {log_message}\")\n\n        # Update cache\n        redis_client.set(f\"feature_flag:{self.flag_name}\", str(value), ex=3600)\n\n        # Store history in a version-controlled manner\n        history_key = f\"feature_flag_history:{self.flag_name}\"\n        history_entry = json.dumps(log_message)\n        redis_client.rpush(history_key, history_entry)\n\n        # Simulate version control by hashing the log message\n        history_hash = hashlib.sha256(history_entry.encode()).hexdigest()\n        redis_client.hset(f\"feature_flag_version:{self.flag_name}\", history_hash, history_entry)\n\n    def get_history(self) -> Dict[str, str]:\n        history_key = f\"feature_flag_history:{self.flag_name}\"\n        history = redis_client.lrange(history_key, 0, -1)\n        return {hashlib.sha256(entry).hexdigest(): entry.decode() for entry in history}\n```\n\n### Step 2: Implement the API Endpoint\n\n```python\nfrom flask import Flask, request, jsonify\nfrom functools import wraps\nimport secrets\n\napp = Flask(__name__)\n\n# Dummy authentication and authorization\ndef authenticate(func):\n    @wraps(func)\n    def wrapper(*args, **kwargs):\n        auth_token = request.headers.get('Authorization')\n        if auth_token != 'secret_token':\n            return jsonify({\"error\": \"Unauthorized\"}), 401\n        return func(*args, **kwargs)\n    return wrapper\n\n@app.route('/update_feature_flag', methods=['POST'])\n@authenticate\ndef update_feature_flag():\n    data = request.json\n    flag_name = data.get('flag_name')\n    value = data.get('value', False)\n    user = data.get('user')\n\n    if not flag_name or not isinstance(value, bool) or not user:\n        return jsonify({\"error\": \"Invalid request\"}), 400\n\n    flag = FeatureFlag(flag_name)\n    flag.update_flag(value, user)\n    return jsonify({\"message\": \"Feature flag updated successfully\"}), 200\n\n@app.route('/feature_flag_history', methods=['GET'])\n@authenticate\ndef feature_flag_history():\n    flag_name = request.args.get('flag_name')\n    if not flag_name:\n        return jsonify({\"error\": \"Invalid request\"}), 400\n\n    flag = FeatureFlag(flag_name)\n    history = flag.get_history()\n    return jsonify(history), 200\n\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n### Step 3: Write Unit and Integration Tests\n\n```python\nimport unittest\n\nclass TestFeatureFlag(unittest.TestCase):\n    def setUp(self):\n        self.flag_name = \"TEST_FEATURE_FLAG\"\n        os.environ[self.flag_name] = \"False\"\n        self.feature_flag = FeatureFlag(self.flag_name)\n\n    def test_is_enabled_default(self):\n        self.assertFalse(self.feature_flag.is_enabled())\n\n    def test_is_enabled_env_var(self):\n        os.environ[self.flag_name] = \"True\"\n        self.assertTrue(self.feature_flag.is_enabled())\n\n    def test_update_flag(self):\n        self.feature_flag.update_flag(True, \"test_user\")\n        self.assertTrue(self.feature_flag.is_enabled())\n\n    def test_history(self):\n        self.feature_flag.update_flag(True, \"test_user\")\n        history = self.feature_flag.get_history()\n        self.assertIn(self.flag_name, history)\n\nif __name__ == '__main__':\n    unittest.main()\n```\n\n### Step 4: Handle Edge Cases and Performance\n\n- **Environment Variables Not Set**: Use a default value and log a warning.\n- **Performance**: Ensure Redis is used for caching to minimize lookups.\n- **API Security**: Implement proper authentication and authorization.\n\nThis setup provides a robust feature flag system with caching, logging, dynamic updates, and version control, while handling edge cases and optimizing for performance."}, {"id": "CAL-003", "task_prompt": "how do i do this: convert this rest api from returning nested json to a flat, normalized response format", "model_output": "To convert a REST API response from a nested JSON format to a flat, normalized format, you can follow these steps. This process involves extracting nested data and transforming it into a more straightforward structure. Here\u2019s a general approach using a programming language like JavaScript, which is commonly used for handling JSON data:\n\n### Step-by-Step Guide\n\n1. **Fetch the JSON Data**: First, make a request to the REST API to get the nested JSON data.\n\n2. **Parse the JSON**: Convert the JSON string into a JavaScript object.\n\n3. **Normalize the Data**: Flatten the nested structure into a flat, normalized format.\n\n4. **Return or Use the Flattened Data**: Output the flattened data in the desired format.\n\n### Example Code in JavaScript\n\nHere\u2019s an example using JavaScript with the Fetch API and a recursive function to flatten the JSON:\n\n```javascript\nasync function fetchAndFlattenData(url) {\n    try {\n        // Step 1: Fetch the JSON data\n        const response = await fetch(url);\n        const data = await response.json();\n\n        // Step 2: Flatten the JSON data\n        const flattenedData = flattenObject(data);\n\n        // Step 3: Return or use the flattened data\n        console.log(flattenedData);\n        return flattenedData;\n    } catch (error) {\n        console.error('Error fetching or flattening data:', error);\n    }\n}\n\nfunction flattenObject(obj, parentKey = '', result = {}) {\n    for (const key in obj) {\n        if (obj.hasOwnProperty(key)) {\n            const newKey = parentKey ? `${parentKey}.${key}` : key;\n            if (typeof obj[key] === 'object' && obj[key] !== null) {\n                flattenObject(obj[key], newKey, result);\n            } else {\n                result[newKey] = obj[key];\n            }\n        }\n    }\n    return result;\n}\n\n// Usage\nfetchAndFlattenData('https://api.example.com/data')\n    .then(flattenedData => {\n        // Do something with the flattened data\n    });\n```\n\n### Explanation\n\n- **fetchAndFlattenData**: This function fetches data from the specified URL, parses the JSON response, and flattens it using the `flattenObject` function.\n\n- **flattenObject**: This recursive function takes an object, a parent key (for nested keys), and a result object. It iterates over each key in the object, and if the value is an object, it recursively flattens it. If the value is not an object, it adds the key-value pair to the result object with a concatenated key.\n\n- **Usage**: Call `fetchAndFlattenData` with the URL of your API, and handle the flattened data as needed.\n\n### Considerations\n\n- **Handling Arrays**: If your nested JSON includes arrays, you might need to decide how to handle them (e.g., flattening each element, or keeping the array structure).\n\n- **Performance**: For very large JSON structures, consider performance implications and optimize the flattening process if necessary.\n\n- **Error Handling**: Ensure robust error handling, especially for network requests and JSON parsing.\n\nBy following these steps and using the provided code as a template, you can convert a nested JSON response to a flat, normalized format suitable for your application\u2019s needs."}, {"id": "CAL-046", "task_prompt": "design a real-time collaborative editing system (like google docs) with conflict resolution using crdts or ot, ensuring that the system can handle up to 1000 concurrent users with low latency (less than 50ms response time) and minimal memory usage (less than 100mb per user) not working help", "model_output": "Designing a real-time collaborative editing system with Conflict-Free Replicated Data Types (CRDTs) or Operational Transformations (OT) involves several key components. Below is a high-level design outline that addresses the requirements of handling up to 1000 concurrent users with low latency and minimal memory usage.\n\n### System Architecture\n\n1. **Client-Side Components:**\n   - **Text Editor:** A lightweight text editor that supports real-time collaboration.\n   - **Local State Management:** Use CRDTs (e.g., Last-Writer-Wins (LWW) or G-Counters) or OT to manage local changes.\n   - **Delta Compression:** Implement delta compression to reduce the amount of data sent over the network.\n\n2. **Server-Side Components:**\n   - **Real-Time Communication:** Use WebSockets or similar technologies to maintain real-time communication between clients and the server.\n   - **State Synchronization:** Implement a robust state synchronization mechanism to merge changes from multiple clients.\n   - **Conflict Resolution:** Use CRDTs for automatic conflict resolution or implement a custom OT-based conflict resolution strategy.\n   - **Load Balancing:** Distribute incoming connections across multiple server instances to handle high concurrency.\n   - **Scalability:** Use horizontally scalable infrastructure (e.g., Kubernetes, Docker Swarm) to add more servers as needed.\n\n3. **Database Layer:**\n   - **In-Memory Database:** Use an in-memory database like Redis or Memcached to store and quickly access user data.\n   - **Persistent Storage:** For durability, use a persistent storage solution like PostgreSQL or MongoDB to periodically sync data.\n\n### Conflict-Free Replicated Data Types (CRDTs)\n\n1. **CRDT Selection:**\n   - Choose a suitable CRDT for the application. For text editing, CRDTs like G-Counters or Last-Writer-Wins (LWW) can be effective.\n   - Use CRDTs to handle concurrent updates without the need for explicit conflict resolution.\n\n2. **CRDT Implementation:**\n   - Implement CRDTs in the client-side and server-side components.\n   - Ensure that CRDT operations are idempotent and commutative to facilitate efficient merging of changes.\n\n### Operational Transformations (OT)\n\n1. **OT Selection:**\n   - For applications where CRDTs might not be suitable, implement OT for managing concurrent edits.\n   - OT involves generating, transforming, and applying operations to ensure consistency across clients.\n\n2. **OT Implementation:**\n   - Implement an operation transformation system that can handle concurrent edits.\n   - Ensure that operations are applied in a way that minimizes conflicts and maintains document integrity.\n\n### Scalability and Performance Optimization\n\n1. **Low Latency:**\n   - Use WebSockets to ensure low-latency communication.\n   - Optimize the client-side code to minimize network round-trips and reduce latency.\n   - Implement a caching mechanism to store frequently accessed data in memory.\n\n2. **Minimal Memory Usage:**\n   - Use delta compression to reduce the amount of data sent over the network.\n   - Optimize the data structures and algorithms used to manage local state.\n   - Ensure that the server-side components are memory-efficient and can handle a high number of concurrent connections.\n\n3. **Concurrency Handling:**\n   - Use asynchronous programming models (e.g., async/await) to handle concurrent operations.\n   - Implement proper locking and synchronization mechanisms to prevent race conditions.\n\n### Deployment and Monitoring\n\n1. **Deployment Strategy:**\n   - Use containerization technologies (e.g., Docker) to package the application and its dependencies.\n   - Deploy the application on a cloud platform (e.g., AWS, Azure, Google Cloud) to ensure scalability and reliability.\n\n2. **Monitoring and Logging:**\n   - Implement monitoring tools (e.g., Prometheus, Grafana) to track system performance and detect issues.\n   - Use logging frameworks (e.g., Log4j, Winston) to capture and analyze logs for troubleshooting and debugging.\n\nBy following this design outline, you can create a real-time collaborative editing system that meets the requirements of handling up to 1000 concurrent users with low latency and minimal memory usage."}];

<script>
// Items embedded above

let ratings = {};
let currentIndex = 0;
let started = false;

async function loadItems() {

function save() {

        ratings: ratings,

function renderWelcome() {

    document.getElementById('app').innerHTML = `
        <h1>Code Output Rater</h1>

            <h2>How this works</h2>

    `;

function startRating() {

    const item = ITEMS[currentIndex];

    const completed = Object.keys(ratings).length;
    const pct = Math.round((completed / ITEMS.length) * 100);
    const allSet = r.correctness && r.completeness && r.prompt_alignment;

    document.getElementById('app').innerHTML = `
        <h1>Item ${currentIndex + 1} of ${ITEMS.length}</h1>
        <div class="progress-text">${completed} of ${ITEMS.length} rated (${pct}%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

        <div class="card">
            <div class="label">Task Prompt</div>
            <div class="task-box">${escapeHtml(item.task_prompt)}</div>
            <div class="label">AI Response</div>
            <div class="response-box">${escapeHtml(item.model_output)}</div>
        </div>

        <div class="card">
            <div class="rating-section">
                <h3>Correctness</h3>
                <div class="rating-hint">Does the code/answer actually work? (1=broken, 5=correct+edges)</div>
                <div class="rating-buttons">
                    ${[1,2,3,4,5].map(v => `<button class="rating-btn ${r.correctness===v?'selected':''}" onclick="rate('correctness',${v})">${v}</button>`).join('')}
                </div>
            </div>
            <div class="rating-section">
                <h3>Completeness</h3>
                <div class="rating-hint">Did it cover everything asked? (1=stub, 5=all requirements)</div>
                <div class="rating-buttons">
                    ${[1,2,3,4,5].map(v => `<button class="rating-btn ${r.completeness===v?'selected':''}" onclick="rate('completeness',${v})">${v}</button>`).join('')}
                </div>
            </div>
            <div class="rating-section">
                <h3>Prompt Alignment</h3>
                <div class="rating-hint">Right approach? (1=ignores prompt, 5=direct+appropriate)</div>
                <div class="rating-buttons">
                    ${[1,2,3,4,5].map(v => `<button class="rating-btn ${r.prompt_alignment===v?'selected':''}" onclick="rate('prompt_alignment',${v})">${v}</button>`).join('')}
                </div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="btn btn-prev" onclick="prev()" ${currentIndex===0?'disabled':''}>Back</button>
            <button class="btn btn-next" onclick="next()" ${!allSet?'disabled':''}>Next</button>
        </div>
        <div class="saved-indicator" id="save-indicator"></div>
    `;
}

function rate(dimension, value) {
    const item = ITEMS[currentIndex];
    if (!ratings[item.id]) ratings[item.id] = {};
    ratings[item.id][dimension] = value;
    ratings[item.id].timestamp = new Date().toISOString();
    save();
    renderItem();
    document.getElementById('save-indicator').textContent = 'Saved automatically';
    setTimeout(() => {
        const el = document.getElementById('save-indicator');
        if (el) el.textContent = '';
    }, 1500);
}

function next() {
    currentIndex++;
    save();
    renderItem();
    window.scrollTo(0, 0);
}

function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        save();
        renderItem();
        window.scrollTo(0, 0);
    }
}

function renderDone() {
    const completed = Object.keys(ratings).length;
    document.getElementById('app').innerHTML = `
        <div class="done-screen">
            <h1>Done!</h1>
            <p>You rated ${completed} of ${ITEMS.length} items.</p>
            <p>Click below to download your ratings file, then email it back.</p>
            <button class="btn btn-download" onclick="downloadRatings()">Download Ratings</button>
            <p style="margin-top:24px; color:#8b949e; font-size:0.85em;">File: craig_ratings.jsonl<br>Send to AB via ProtonMail.</p>
        </div>
    `;
}

function downloadRatings() {
    let lines = [];
    for (const item of ITEMS) {
        if (ratings[item.id]) {
            lines.push(JSON.stringify({
                id: item.id,
                correctness: ratings[item.id].correctness,
                completeness: ratings[item.id].completeness,
                prompt_alignment: ratings[item.id].prompt_alignment,
                rater: "Craig",
                timestamp: ratings[item.id].timestamp
            }));
        }
    }
    const blob = new Blob([lines.join('\n') + '\n'], {type: 'application/jsonl'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'craig_ratings.jsonl';
    a.click();
    URL.revokeObjectURL(url);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadItems();
</script>
</body>
</html>
